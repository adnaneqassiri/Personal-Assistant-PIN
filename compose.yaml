services:
  #les bases de données 



  ########
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      bash -c "/opt/spark/sbin/start-master.sh && tail -f /opt/spark/logs/spark--org.apache.spark.deploy.master*.out"
    ports:
      - "8080:8080"  # Spark Master UI
      - "7077:7077"  # Spark master listening port

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    hostname: spark-worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      bash -c "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 --cores 2 --memory 2g && tail -f /opt/spark/logs/spark--org.apache.spark.deploy.worker*.out"
    ports:
      - "8081:8081"
    depends_on:
      - spark-master
    

  kafka:
    image: apache/kafka:4.0.2
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_EXTERNAL://localhost:29092 
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092  

  context-ingestion-builder:
    image: apache/spark:3.5.1
    container_name: context-ingestion-builder
    profiles:
      - context-ingestion
    depends_on:
      - kafka
    env_file:
      - .env
    working_dir: /opt/spark-apps
    volumes:
      - ./:/opt/spark-apps
    environment:
      PYTHONPATH: /opt/spark-apps
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CONTEXT_TOPIC: normalized-context
      AUDIO_STREAM_TOPIC: audio_stream
      VIDEO_STREAM_TOPIC: video_stream
      LOCATION_STREAM_TOPIC: location_stream
      CONTEXT_BUILDER_CHECKPOINT_LOCATION: /tmp/context-builder-checkpoint
      LOG_LEVEL: INFO
    command: >
      bash -c "pip install --no-cache-dir -r context_ingestion/requirements.txt &&
      /opt/spark/bin/spark-submit
      --master local[*]
      --conf spark.jars.ivy=/tmp/.ivy
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
      context_ingestion/builder/context_builder.py"

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: assistant_db
    volumes:
      - mongodb_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123

volumes:
  mongodb_data:
